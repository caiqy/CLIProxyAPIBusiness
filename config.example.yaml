# cpab 额外配置（cpab 自己读取）
database-dsn: "postgres://cpab:insecure-change-me@127.0.0.1:5432/cpab?sslmode=disable"
# 或者：
# database:
#   dsn: "postgres://cpab:insecure-change-me@127.0.0.1:5432/cpab?sslmode=disable"

jwt:
  secret: "insecure-jwt-secret-change-me"
  expiry: "720h"

# ===== CLIProxyAPI v6.7.24 配置（cpab 继承；下面字段来自 CLIProxyAPI）=====

# 监听地址：空字符串表示 0.0.0.0
host: ""
port: 8318

tls:
  enable: false
  cert: ""
  key: ""

remote-management:
  allow-remote: false
  secret-key: ""
  disable-control-panel: true
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

# 认证目录（保存各类 OAuth/token 文件）
auth-dir: "~/.cli-proxy-api"

# 访问本服务的 API keys（客户端请求带 Authorization: Bearer <key>）
api-keys:
  - "your-api-key-1"

debug: false
commercial-mode: true
logging-to-file: false
logs-max-total-size-mb: 0
usage-statistics-enabled: false

# 全局上游代理（可选；单个 key/provider 也可覆盖）
proxy-url: ""

# 全局 TLS 证书校验开关（仅影响上游 API 请求）
# true = 跳过证书校验（不安全，仅建议受控内网排障使用）
# false = 严格校验证书（默认）
tls-insecure-skip-verify: false

# 模型前缀控制（多租户/多组 key 时用）
force-model-prefix: false

# 记录每次请求/响应明细到文件（会产生日志文件，建议配合 logging-to-file）
request-log: false

# 访问控制提供方（可选，不配则只用 api-keys）
auth:
  providers: []
  # - name: "config-inline"
  #   type: "config-api-key"
  #   api-keys:
  #     - "your-api-key-1"

# 流式行为
streaming:
  keepalive-seconds: 0
  bootstrap-retries: 0
  anthropic-sse-lifecycle-enable: true

# 非流式"空行保活"（秒）
nonstream-keepalive-interval: 0

# 上游请求超时配置（可选，不配置时使用默认值）
# 这些超时适用于所有 provider executor（codex、claude、gemini、kiro 等）
upstream-timeouts:
  # 连接超时：TCP 连接建立 + TLS 握手的最大等待时间（秒）
  # 默认值：10 秒。设为 0 表示使用 Go 默认值（无显式超时）
  connect-timeout-seconds: 10
  # 响应头超时：发送请求后等待响应头/首包的最大时间（秒）
  # 这是解决"请求卡住数分钟"问题的关键超时
  # 默认值：30 秒。设为 0 表示使用 Go 默认值（无显式超时）
  response-header-timeout-seconds: 30

# 冷却/重试
disable-cooling: true
request-retry: 3
max-retry-interval: 30

quota-exceeded:
  switch-project: true
  switch-preview-model: true

routing:
  strategy: "round-robin" # round-robin / fill-first

# WebSocket API 认证开关
ws-auth: false

# Codex 指令注入开关
codex-instructions-enabled: false

# GitHub Copilot 执行器行为覆盖（可选）
# github-copilot:
#   header-policy:
#     # legacy (默认): 真实请求沿用旧逻辑（含部分透传）
#     # dual-run:      真实请求仍按 legacy 发出，同时旁路运行 strict 候选并输出 diff
#     # strict:        禁止透传 incoming headers，仅按治理规则生成
#     mode: legacy # legacy / dual-run / strict
#
#     # 以下 4 个字段用于 strict/dual-run 候选头生成（优先级低于 auth metadata）
#     user-agent: GitHubCopilotChat/0.39.0
#     editor-version: vscode/1.111.0
#     editor-plugin-version: copilot-chat/0.39.0
#     anthropic-beta: advanced-tool-use-2025-11-20
#
#     # strict/dual-run 候选的会话状态文件（用于 Vscode-Sessionid / X-Interaction-Id）
#     # 建议使用持久化路径
#     session-state-file: /CLIProxyAPIBusiness/data/copilot_session_state.json
#
#     # dual-run 专用影子状态文件：仅用于旁路候选计算，不污染主状态
#     shadow-state-file: /CLIProxyAPIBusiness/data/copilot_session_state.shadow.json
#
#   # 强制将 X-Initiator 推导为 agent：
#   # 当请求中没有 assistant/tool 角色时，注入一条伪 assistant 消息
#   force-agent-initiator: true
#
#   # 注入的伪 assistant 文本，留空默认 "OK."
#   fake-assistant-content: "OK."
#
#   # 周期性放行（滚动窗口内严格一次不注入）
#   # 分桶维度：model + 稳定身份（auth.ID / access_token）
#   force-agent-initiator-bypass:
#     enabled: true
#     window: 1h
#     # 建议挂载到持久化目录，避免容器重启后状态丢失
#     state-file: /CLIProxyAPIBusiness/data/copilot_initiator_bypass_state.json

